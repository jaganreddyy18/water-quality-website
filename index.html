<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Intelligence</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
body {
margin:0;
font-family:'Poppins',sans-serif;
background:black;
color:white;
overflow:hidden;
}

/* 🌊 Animated gradient background */
body::before{
content:'';
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle,#00f7ff33,transparent 70%);
animation:move 10s infinite linear;
z-index:-1;
}

@keyframes move{
0%{transform:translate(-20%,-20%)}
50%{transform:translate(20%,20%)}
100%{transform:translate(-20%,-20%)}
}

/* center */
.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

/* title */
h1{
font-size:40px;
opacity:0;
}

/* button */
button{
padding:15px 30px;
margin-top:20px;
border:none;
border-radius:30px;
background:#00f7ff;
color:black;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

button:hover{
box-shadow:0 0 30px #00f7ff;
transform:scale(1.1);
}

/* panel */
.panel{
position:fixed;
bottom:-100%;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:400px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:20px;
border-radius:20px;
transition:0.5s;
}

/* inputs */
input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:10px;
border:none;
}

/* result */
.result{
margin-top:10px;
font-size:18px;
}
</style>
</head>

<body>

<div class="container">
<h1 id="title">💧 WATER INTELLIGENCE</h1>
<button onclick="openPanel()">Start Analysis</button>
</div>

<div class="panel" id="panel">
<input type="number" id="ph" placeholder="pH">
<input type="number" id="tds" placeholder="TDS">
<input type="number" id="temp" placeholder="Temperature">
<input type="number" id="turbidity" placeholder="Turbidity">

<button onclick="checkWater()">Check Water</button>

<div class="result" id="result"></div>
</div>

<script>

/* Title animation */
gsap.to("#title",{opacity:1,y:-20,duration:2});

/* Open panel */
function openPanel(){
document.getElementById("panel").style.bottom="20px";
}

/* Water check */
function checkWater(){
let ph = parseFloat(document.getElementById("ph").value);
let tds = parseFloat(document.getElementById("tds").value);
let temp = parseFloat(document.getElementById("temp").value);
let turbidity = parseFloat(document.getElementById("turbidity").value);

let result = document.getElementById("result");

if(isNaN(ph)||isNaN(tds)||isNaN(temp)||isNaN(turbidity)){
result.innerHTML="⚠ Enter all values";
return;
}

let score = 0;

if(ph>=6.5 && ph<=8.5) score++;
if(tds<300) score++;
if(temp>=15 && temp<=30) score++;
if(turbidity<=5) score++;

if(score==4){
result.innerHTML="✅ SAFE WATER";
}
else if(score>=2){
result.innerHTML="⚠ NEEDS FILTRATION";
}
else{
result.innerHTML="❌ UNSAFE WATER";
}
}

</script>

</body>
</html>
