<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Water Quality</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<!-- Scroll Reveal -->
<script src="https://unpkg.com/scrollreveal"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(120deg,#001f3f,#0074D9);
color:white;
overflow-x:hidden;
}

/* 🌊 Animated Background */
.wave{
position:fixed;
width:200%;
height:200%;
background:rgba(255,255,255,0.05);
top:-50%;
left:-50%;
border-radius:40%;
animation:rotate 20s linear infinite;
z-index:-1;
}

.wave:nth-child(2){
animation-duration:30s;
opacity:0.3;
}

@keyframes rotate{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

/* Container */
.container{
max-width:900px;
margin:60px auto;
padding:20px;
}

/* Glass Card */
.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
border-radius:20px;
padding:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px) scale(1.01);
}

/* Heading */
h1{
text-align:center;
margin-bottom:10px;
font-size:32px;
}

.sub{
text-align:center;
margin-bottom:30px;
opacity:0.8;
}

/* Grid */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

/* Inputs */
.input-box{
display:flex;
flex-direction:column;
}

label{
margin-bottom:5px;
font-size:14px;
}

input{
padding:12px;
border:none;
border-radius:10px;
outline:none;
font-size:16px;
}

/* Button */
button{
margin-top:25px;
padding:14px;
width:100%;
border:none;
border-radius:12px;
background:#00c6ff;
color:white;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#00aaff;
box-shadow:0 0 20px #00c6ff;
}

/* Result */
.result{
margin-top:25px;
padding:20px;
border-radius:15px;
display:none;
animation:fadeIn 0.6s ease;
}

.safe{background:#2ecc71;}
.medium{background:#f1c40f;}
.unsafe{background:#e74c3c;}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* Bars */
.bar{
margin-top:15px;
}

.progress{
height:10px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin-top:5px;
}

.fill{
height:100%;
background:white;
transition:1s;
}

/* Responsive */
@media(max-width:700px){
.grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="wave"></div>
<div class="wave"></div>

<div class="container">

<div class="card" id="mainCard">
<h1>💧 Smart Water Analyzer</h1>
<p class="sub">Interactive Water Quality Monitoring System</p>

<div class="grid">

<div class="input-box">
<label>pH Value</label>
<input type="number" id="ph" step="0.1">
</div>

<div class="input-box">
<label>Turbidity (NTU)</label>
<input type="number" id="turbidity">
</div>

<div class="input-box">
<label>Temperature (°C)</label>
<input type="number" id="temp">
</div>

<div class="input-box">
<label>TDS (ppm)</label>
<input type="number" id="tds">
</div>

</div>

<button onclick="checkWater()">Analyze Water</button>

<div class="result" id="result"></div>

</div>

</div>

<script>

/* Scroll Animation */
ScrollReveal().reveal('#mainCard',{
distance:'50px',
duration:1200,
origin:'bottom'
});

/* Logic */
function checkWater(){
let ph = parseFloat(document.getElementById("ph").value);
let turbidity = parseFloat(document.getElementById("turbidity").value);
let temp = parseFloat(document.getElementById("temp").value);
let tds = parseFloat(document.getElementById("tds").value);

let result = document.getElementById("result");

if(isNaN(ph)||isNaN(turbidity)||isNaN(temp)||isNaN(tds)){
alert("Enter all values");
return;
}

let score = 0;

if(ph >= 6.5 && ph <= 8.5) score++;
if(turbidity <= 5) score++;
if(temp >= 15 && temp <= 30) score++;
if(tds <= 300) score++;

let status="", color="", suggestion="";

if(score == 4){
status="✅ SAFE WATER";
suggestion="Water is safe for drinking.";
color="safe";
}
else if(score >=2){
status="⚠ NEEDS FILTRATION";
suggestion="Filter or boil before use.";
color="medium";
}
else{
status="❌ UNSAFE WATER";
suggestion="Do not drink this water.";
color="unsafe";
}

result.style.display="block";
result.className="result "+color;

result.innerHTML = `
<h2>${status}</h2>
<p>${suggestion}</p>

<div class="bar">pH
<div class="progress"><div class="fill" style="width:${ph/14*100}%"></div></div></div>

<div class="bar">Turbidity
<div class="progress"><div class="fill" style="width:${Math.min(turbidity*10,100)}%"></div></div></div>

<div class="bar">Temperature
<div class="progress"><div class="fill" style="width:${Math.min(temp*3,100)}%"></div></div></div>

<div class="bar">TDS
<div class="progress"><div class="fill" style="width:${Math.min(tds/10,100)}%"></div></div></div>
`;
}
</script>

</body>
</html>
