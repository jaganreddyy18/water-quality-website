<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Intelligence</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
body {
margin:0;
overflow:hidden;
font-family:'Poppins',sans-serif;
background:black;
color:white;
}

/* Canvas Background */
#bg {
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* Center Content */
.content {
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

h1 {
font-size:50px;
letter-spacing:2px;
opacity:0;
}

button {
margin-top:30px;
padding:15px 30px;
border:none;
border-radius:30px;
background:#00f7ff;
color:black;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

button:hover {
box-shadow:0 0 30px #00f7ff;
transform:scale(1.1);
}

/* Input Panel */
.panel {
position:absolute;
bottom:-100%;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:400px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:20px;
border-radius:20px;
}

input {
width:100%;
margin:8px 0;
padding:10px;
border-radius:10px;
border:none;
}

.result {
margin-top:15px;
font-size:18px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="content">
<h1 id="title">💧 WATER INTELLIGENCE</h1>
<button onclick="openPanel()">Analyze Water</button>
</div>

<div class="panel" id="panel">
<input type="number" id="ph" placeholder="pH">
<input type="number" id="tds" placeholder="TDS">
<input type="number" id="temp" placeholder="Temperature">
<input type="number" id="turbidity" placeholder="Turbidity">
<button onclick="checkWater()">Check</button>
<div class="result" id="result"></div>
</div>

<script>

/* 🌌 3D PARTICLES */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({canvas:document.getElementById("bg")});

renderer.setSize(innerWidth, innerHeight);
camera.position.z = 5;

const geometry = new THREE.BufferGeometry();
const vertices = [];

for(let i=0;i<5000;i++){
vertices.push(
(Math.random()-0.5)*10,
(Math.random()-0.5)*10,
(Math.random()-0.5)*10
);
}

geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices,3));

const material = new THREE.PointsMaterial({color:0x00f7ff});
const particles = new THREE.Points(geometry,material);

scene.add(particles);

function animate(){
requestAnimationFrame(animate);
particles.rotation.y += 0.0005;
renderer.render(scene,camera);
}
animate();

/* ✨ TEXT ANIMATION */
gsap.to("#title",{opacity:1,y:-20,duration:2});

/* PANEL OPEN */
function openPanel(){
gsap.to("#panel",{bottom:"20px",duration:1});
}

/* WATER LOGIC */
function checkWater(){
let ph = ph.value;
let tds = tds.value;

let result = document.getElementById("result");

if(ph>=6.5 && ph<=8.5 && tds<300){
result.innerHTML="✅ SAFE WATER";
}
else{
result.innerHTML="❌ UNSAFE WATER";
}
}

</script>

</body>
</html>
